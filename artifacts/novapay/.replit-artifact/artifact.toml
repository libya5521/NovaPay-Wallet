kind = "mobile"
previewPath = "/"
title = "NovaPay"
version = "1.0.0"
id = "artifacts/novapay"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21242

[services.development]
run = "pnpm --filter @workspace/novapay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novapay", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/novapay", "run", "serve" ]

[services.env]
PORT = "21242"
BASE_PATH = "/"
